<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito</title>

    <link rel="stylesheet" href="css/carrito.css">
</head>

<body>

    <div class="contenedor">

        <h1>🛒 Mi Carrito</h1>

        <div id="lista-carrito"></div>

        <div class="resumen">

            <p>
                Productos:
                <span id="cantidad-total">0</span>
            </p>

            <p>
                Subtotal:
                <span id="subtotal">S/ 0</span>
            </p>

            <p>
                Envío:
                <span id="envio">S/ 15</span>
            </p>

            <h2>
                Total:
                <span id="total">S/ 0</span>
            </h2>

            <button id="vaciar">

                Vaciar carrito

            </button>

            <button id="comprar">

                Finalizar compra

            </button>

        </div>

        <a href="index.html">

            ← Seguir comprando

        </a>

    </div>

    <script src="js/carrito.js"></script>

</body>
</html>
